<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emeka Green</title>
  <meta name="description" content="Emeka Green — indie rock for people who never felt like they belonged." />
  <link rel="stylesheet" href="landing.css" />
</head>
<body>
  <div class="landing-bg" aria-hidden="true"></div>
  <div class="landing-grain" aria-hidden="true"></div>

  <main class="landing">
    <div class="landing-main">
      <header class="landing-hero landing-anim">
        <h1 class="visually-hidden">Emeka Green</h1>
      </header>

      <div class="landing-center">
        <div class="landing-ctas">
        <a
          id="spotify-cta"
          class="btn btn-primary landing-anim landing-anim-d1"
          href="https://open.spotify.com/track/42VCmIMMMRxCYXSUjoKcUj?si=b37527d24def402a"
          target="_blank"
          rel="noopener noreferrer"
        >Listen to Levitating on Spotify</a>

        <div class="join-block landing-anim landing-anim-d2">
          <p class="join-subtext">Early songs, acoustic versions &amp; voice notes</p>
          <form
            class="join-form"
            action="https://formspree.io/f/xjgedkbr"
            method="POST"
          >
            <label class="visually-hidden" for="landing-email">Email</label>
            <input
              id="landing-email"
              type="email"
              name="email"
              placeholder="Your email"
              required
              autocomplete="email"
              inputmode="email"
            />
            <input type="hidden" name="_subject" value="Outsiders Club — QR landing" />
            <input type="hidden" name="source" id="form-source" value="direct" />
            <button type="submit" class="btn btn-secondary">Join the Outsiders Club</button>
          </form>
        </div>
      </div>
      </div>

      <footer class="landing-bottom">
        <p class="tagline landing-anim landing-anim-d3">For people who never felt like they belonged.</p>
        <p class="identity landing-anim landing-anim-d3">Irish-Nigerian indie rock artist</p>

        <nav class="landing-social landing-anim landing-anim-d4" aria-label="Social links">
          <a
            class="social-link"
            data-outbound
            href="https://www.instagram.com/emekagreen_/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9A5.5 5.5 0 0 1 16.5 22h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Zm0 2A3.5 3.5 0 0 0 4 7.5v9A3.5 3.5 0 0 0 7.5 20h9a3.5 3.5 0 0 0 3.5-3.5v-9A3.5 3.5 0 0 0 16.5 4h-9Zm4.5 4.5A5.5 5.5 0 1 1 6.5 14 5.5 5.5 0 0 1 12 8.5Zm0 2A3.5 3.5 0 1 0 15.5 14 3.5 3.5 0 0 0 12 10.5ZM18 6.8a1.1 1.1 0 1 1-1.1 1.1A1.1 1.1 0 0 1 18 6.8Z" />
            </svg>
          </a>
          <a
            class="social-link"
            data-outbound
            href="https://www.tiktok.com/@emekagreen"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="TikTok"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M16.2 2h2.1c.2 2 1.4 3.8 3.2 4.8v2.3c-1.9 0-3.6-.6-5.1-1.7v7.5c0 4-3.2 7.2-7.2 7.2S2 20.9 2 16.9s3.2-7.2 7.2-7.2c.4 0 .9 0 1.3.1v2.6c-.4-.1-.8-.2-1.3-.2-2.5 0-4.6 2-4.6 4.6s2 4.6 4.6 4.6 4.6-2 4.6-4.6V2h1.9Z" />
            </svg>
          </a>
        </nav>
      </footer>
    </div>
  </main>

  <script src="landing.js" defer></script>
</body>
</html>
